services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ALLOWED_ORIGINS=http://187.127.189.33

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://187.127.189.33/api
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
